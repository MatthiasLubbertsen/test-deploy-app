# Deploy a snapshot of the PR contents into gh-pages/<5-char-short-hash>
# Runs in pull_request_target context so it runs automatically and can push to the repo.
on:
  pull_request_target:
    types: [opened, reopened, ready_for_review, synchronize]

permissions:
  contents: write
  pages: write
  id-token: write

jobs:
  pr-deploy-to-gh-pages:
    runs-on: ubuntu-latest
    steps:
      - name: Log PR info
        run: |
          echo "PR #${{ github.event.number }}"
          echo "PR head repo: ${{ github.event.pull_request.head.repo.full_name }}"
          echo "PR head sha: ${{ github.event.pull_request.head.sha }}"

      - name: Checkout base repository (needed to push)
        uses: actions/checkout@v4
        with:
          fetch-depth: 0
          persist-credentials: true

      - name: Fetch PR head into local branch
        shell: bash
        run: |
          set -euo pipefail
          echo "Fetching PR #${{ github.event.number }} head..."
          git fetch origin +refs/pull/${{ github.event.number }}/head:pr-head
          git checkout pr-head
          echo "Checked out PR head: $(git rev-parse --short=7 HEAD)"

      - name: Export PR tree and generate short id (5 chars)
        id: export
        shell: bash
        run: |
          set -euo pipefail
          # Use the commit short sha (5 hex chars) for a short deterministic id
          SHORT=$(git rev-parse --short=5 HEAD)
          echo "short_id=$SHORT" >> "$GITHUB_OUTPUT"

          mkdir -p deploy_tmp
          # Export files (no .git, no hooks)
          git archive --format=tar HEAD | tar -x -C deploy_tmp
          echo "Exported PR contents to deploy_tmp/ (SHORT=${SHORT})"

      - name: Configure git identity (local)
        shell: bash
        run: |
          set -euo pipefail
          # Use explicit --local and simple single-quoted strings to avoid any shell parsing issues
          git config --local user.name 'github-actions[bot]'
          git config --local user.email 'github-actions[bot]@users.noreply.github.com'
          git config --local --list

      - name: Prepare gh-pages branch (create if missing)
        shell: bash
        run: |
          set -euo pipefail
          if git ls-remote --exit-code --heads origin gh-pages >/dev/null 2>&1; then
            echo "gh-pages exists, fetching and checking out..."
            git fetch origin gh-pages:gh-pages
            git checkout gh-pages
          else
            echo "gh-pages does not exist; creating orphan gh-pages branch..."
            git checkout --orphan gh-pages
            git rm -rf --ignore-unmatch .
            git commit --allow-empty -m "Initialize gh-pages branch"
            git push origin gh-pages
            git checkout gh-pages
          fi

      - name: Add snapshot to gh-pages/<short> and push
        shell: bash
        env:
          SHORT_ID: ${{ steps.export.outputs.short_id }}
        run: |
          set -euo pipefail
          DEST_DIR="${SHORT_ID}"
          echo "Adding snapshot into folder: ${DEST_DIR}"
          mkdir -p "${DEST_DIR}"

          if command -v rsync >/dev/null 2>&1; then
            rsync -a --exclude='.git' deploy_tmp/ "${DEST_DIR}/"
          else
            cp -R deploy_tmp/. "${DEST_DIR}/"
          fi

          # Stage changes
          git add -A "${DEST_DIR}"

          # Commit only if there are staged changes
          if git diff --staged --quiet; then
            echo "No changes to commit for ${DEST_DIR}"
          else
            git commit -m "Add PR #${{ github.event.number }} snapshot: ${DEST_DIR} [ci skip]"
            git push origin gh-pages
            echo "Pushed ${DEST_DIR} to gh-pages"
          fi

      - name: (Optional) Attempt to configure Pages to use gh-pages (non-fatal)
        if: always()
        shell: bash
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          set -euo pipefail
          repo="${{ github.repository }}"
          payload='{"source":{"branch":"gh-pages","path":"/"}}'
          # May return 403 if token doesn't have required admin scope; ignore failure.
          curl -sS -X PUT -H "Accept: application/vnd.github+json" \
            -H "Authorization: Bearer $GITHUB_TOKEN" \
            "https://api.github.com/repos/${repo}/pages" -d "${payload}" || true
