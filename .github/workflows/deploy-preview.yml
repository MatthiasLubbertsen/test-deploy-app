# Deploy a snapshot of the PR contents into gh-pages/<short-id>
# Runs automatically for PR events (uses pull_request_target so it does NOT require manual approval
# and has permission to push to this repository). IMPORTANT: we do NOT execute any code from the PR.
on:
  pull_request_target:
    types: [opened, reopened, ready_for_review, synchronize]

permissions:
  contents: write
  pages: write
  id-token: write

jobs:
  pr-deploy-to-gh-pages:
    runs-on: ubuntu-latest
    steps:
      - name: Get PR metadata (for logging)
        run: |
          echo "PR #${{ github.event.number }}"
          echo "PR head repo: ${{ github.event.pull_request.head.repo.full_name }}"
          echo "PR head sha: ${{ github.event.pull_request.head.sha }}"

      - name: Checkout base repository (needed to push to gh-pages)
        uses: actions/checkout@v4
        with:
          fetch-depth: 0
          persist-credentials: true

      - name: Fetch and check out PR head into safe branch (no PR code executed)
        shell: bash
        run: |
          set -euo pipefail
          echo "Fetching PR head..."
          # fetch PR head into a local branch and check it out
          git fetch origin +refs/pull/${{ github.event.number }}/head:pr-head
          git checkout pr-head
          echo "Checked out PR head: $(git rev-parse --short HEAD)"

      - name: Export PR files (git archive -> deploy_tmp) and create short id
        id: export
        shell: bash
        run: |
          set -euo pipefail
          # short id: first 5 hex chars derived from current epoch (stable and short)
          SHORT=$(date +%s | md5sum | cut -c1-5)
          echo "short_id=$SHORT" >> "$GITHUB_OUTPUT"

          mkdir -p deploy_tmp
          # export repository tree for the checked-out commit (no .git, no hooks executed)
          git archive --format=tar HEAD | tar -x -C deploy_tmp
          echo "Exported PR contents to deploy_tmp/"

      - name: Prepare gh-pages branch (create if missing)
        shell: bash
        run: |
          set -euo pipefail
          # Set commit identity for the action
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"

          # If gh-pages exists remotely, fetch and check it out; otherwise create an orphan branch
          if git ls-remote --exit-code --heads origin gh-pages >/dev/null 2>&1; then
            echo "gh-pages exists, checking out..."
            git fetch origin gh-pages:gh-pages
            git checkout gh-pages
          else
            echo "gh-pages does not exist, creating orphan gh-pages branch..."
            git checkout --orphan gh-pages
            git rm -rf --ignore-unmatch .
            git commit --allow-empty -m "Initialize gh-pages branch"
            git push origin gh-pages
          fi

      - name: Add snapshot to gh-pages/<short-id> and push
        shell: bash
        env:
          SHORT_ID: ${{ steps.export.outputs.short_id }}
        run: |
          set -euo pipefail
          DEST_DIR="${SHORT_ID}"
          echo "Creating destination dir: ${DEST_DIR}"
          mkdir -p "${DEST_DIR}"
          # copy exported files into destination folder
          if command -v rsync >/dev/null 2>&1; then
            rsync -a --exclude='.git' deploy_tmp/ "${DEST_DIR}/"
          else
            cp -R deploy_tmp/. "${DEST_DIR}/"
          fi

          # Add the new snapshot folder and push only if there are changes
          git add --intent-to-add "${DEST_DIR}" || true
          if git diff --cached --quiet; then
            echo "No new changes to commit"
          else
            git commit -m "Add PR #${{ github.event.number }} snapshot: ${DEST_DIR} [ci skip]"
            git push origin gh-pages
          fi

      - name: Optional: Attempt configure Pages to serve gh-pages (non-fatal)
        if: always()
        shell: bash
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          set -euo pipefail
          repo="${{ github.repository }}"
          payload='{"source":{"branch":"gh-pages","path":"/"}}'
          # This may fail if the token does not have the necessary admin scopes; we ignore failure.
          curl -sS -X PUT -H "Accept: application/vnd.github+json" \
            -H "Authorization: Bearer $GITHUB_TOKEN" \
            "https://api.github.com/repos/${repo}/pages" -d "${payload}" || true
